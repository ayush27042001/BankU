<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Commission Plan Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            background: #eef1f7
        }

        .card {
            border: 0;
            border-radius: 14px;
            box-shadow: 0 6px 18px rgba(0,0,0,.08)
        }

        .table thead {
            background: #1f2937;
            color: white
        }

        .status-active {
            background: #22c55e;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px
        }

        .status-inactive {
            background: #ef4444;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px
        }
    </style>

</head>

<body>

    <div class="container mt-5">

        <div class="d-flex justify-content-between mb-4">
            <h3 class="fw-bold">Commission Plan</h3>
            <button class="btn btn-primary" onclick="openCreate()">+ New Plan</button>
        </div>

        <div class="card p-4">

            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Plan Name</th>
                        <th>Status</th>
                        <th width="170">Action</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>

            <div class="d-flex justify-content-between">
                <button class="btn btn-outline-secondary" id="prevBtn">Previous</button>
                <span id="pageInfo"></span>
                <button class="btn btn-outline-secondary" id="nextBtn">Next</button>
            </div>

        </div>
    </div>

    <!-- MODAL -->

    <div class="modal fade" id="planModal">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 id="modalTitle">Create Plan</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input type="hidden" id="planId">

                    <div class="mb-3">
                        <label>Plan Name *</label>
                        <input type="text" id="planName" class="form-control">
                        <div class="text-danger small" id="errName"></div>
                    </div>

                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="isActive">
                        <label class="form-check-label">Active</label>
                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary" id="saveBtn">Save</button>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        const API_BASE = "https://localhost:7142/api/admin/commission-plan";

        let page = 1, pageSize = 10, totalPages = 1;
        let modal = new bootstrap.Modal(document.getElementById("planModal"));

        $(document).ready(() => {
            loadData();
            $("#saveBtn").click(savePlan);
            $("#prevBtn").click(() => { page--; if (page < 1) page = 1; loadData() });
            $("#nextBtn").click(() => { page++; if (page > totalPages) page = totalPages; loadData() });
        });

        function loadData() {
            $.get(`${API_BASE}?page=${page}&pageSize=${pageSize}`)
                .done(res => {

                    totalPages = Math.ceil(res.totalCount / pageSize);

                    if (res.items.length === 0) {
                        $("#tbody").html("<tr><td colspan='4' class='text-center text-muted'>No Records</td></tr>");
                        return;
                    }

                    let rows = "";
                    res.items.forEach(p => {
                        rows += `
<tr>
<td>${p.planId}</td>
<td>${p.planName ?? ""}</td>
<td>${p.isActive ? '<span class="status-active">Active</span>' : '<span class="status-inactive">Inactive</span>'}</td>
<td>
<button class="btn btn-sm btn-warning" onclick="edit(${p.planId},'${(p.planName || '').replace(/'/g, "\\'")}',${p.isActive})">Edit</button>
<button class="btn btn-sm btn-danger" onclick="del(${p.planId})">Delete</button>
</td>
</tr>`;
                    });
                    $("#tbody").html(rows);
                    $("#pageInfo").text(`Page ${page} of ${totalPages}`);
                })
                .fail(() => Swal.fire("Error", "Failed to load data", "error"));
        }

        function openCreate() {
            $("#modalTitle").text("Create Plan");
            $("#planId").val("");
            $("#planName").val("");
            $("#isActive").prop("checked", true);
            $("#errName").text("");
            modal.show();
        }

        function edit(id, name, active) {
            $("#modalTitle").text("Update Plan");
            $("#planId").val(id);
            $("#planName").val(name);
            $("#isActive").prop("checked", active);
            $("#errName").text("");
            modal.show();
        }

        function validate() {
            let name = $("#planName").val().trim();
            if (name.length < 3) {
                $("#errName").text("Minimum 3 characters required");
                return false;
            }
            $("#errName").text("");
            return true;
        }

        function savePlan() {

            if (!validate()) return;

            let id = $("#planId").val();
            let payload = {
                planName: $("#planName").val().trim(),
                isActive: $("#isActive").is(":checked")
            };

            $.ajax({
                url: id ? `${API_BASE}/${id}` : API_BASE,
                type: id ? "PUT" : "POST",
                contentType: "application/json",
                data: JSON.stringify(payload)
            })
                .done(() => {
                    modal.hide();
                    Swal.fire({ icon: "success", title: "Saved", timer: 1200, showConfirmButton: false });
                    loadData();
                })
                .fail(xhr => {
                    Swal.fire("Error", xhr.responseText || "Operation failed", "error");
                });
        }

        function del(id) {
            Swal.fire({
                title: "Delete this plan?",
                icon: "warning",
                showCancelButton: true
            }).then(r => {
                if (!r.isConfirmed) return;

                $.ajax({ url: `${API_BASE}/${id}`, type: "DELETE" })
                    .done(() => { Swal.fire("Deleted", "", "success"); loadData(); })
                    .fail(() => Swal.fire("Error", "Delete failed", "error"));
            });
        }

    </script>

</body>
</html>
